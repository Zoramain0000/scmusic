<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundCloud Advanced Downloader v2.3 - Hacker Activists Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #000 100%);
            color: #00ff88;
            font-family: 'Roboto Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Grid */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.1;
        }

        .matrix-line {
            position: absolute;
            background: linear-gradient(to bottom, transparent, #00ff88, transparent);
            animation: matrix-fall linear infinite;
        }

        @keyframes matrix-fall {
            0% { transform: translateY(-100vh); opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00ccff, #ff00ff, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.8;
            color: #00ccff;
        }

        /* Input Section */
        .input-section {
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.3);
        }

        .url-input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .url-input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff88;
            border-radius: 10px;
            color: #00ff88;
            font-family: 'Roboto Mono', monospace;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }

        .url-input:focus {
            outline: none;
            border-color: #00ccff;
            box-shadow: 0 0 20px rgba(0, 204, 255, 0.5);
            transform: scale(1.02);
        }

        .url-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #00ff88;
            font-size: 1.2em;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00ff88, #00ccff);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.8);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #ff00ff, #ffaa00);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(255, 0, 255, 0.8);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Progress Bar */
        .progress-container {
            margin: 20px 0;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #00ff88;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 8px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            text-align: center;
            margin-top: 10px;
            font-family: 'Orbitron', monospace;
            color: #00ccff;
        }

        /* Results Section */
        .results-section {
            display: none;
            background: rgba(0, 20, 40, 0.9);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.4);
        }

        .track-info {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #00ff88;
        }

        .track-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.5em;
            color: #00ff88;
            margin-bottom: 10px;
        }

        .track-artist {
            color: #00ccff;
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        .track-duration {
            color: #ffaa00;
        }

        .download-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .download-btn {
            flex: 1;
            padding: 12px 20px;
            background: linear-gradient(45deg, #00ff88, #00ccff);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            font-size: 1em;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.6);
        }

        .download-btn.mp3 { background: linear-gradient(45deg, #00ff88, #00ccff); }
        .download-btn.flac { background: linear-gradient(45deg, #ff00ff, #ffaa00); }
        .download-btn.waveform { background: linear-gradient(45deg, #00ccff, #ff00ff); }

        /* Status Messages */
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-weight: 700;
        }

        .status.success { background: rgba(0, 255, 136, 0.2); border: 1px solid #00ff88; color: #00ff88; }
        .status.error { background: rgba(255, 0, 100, 0.2); border: 1px solid #ff0066; color: #ff0066; }
        .status.loading { background: rgba(0, 204, 255, 0.2); border: 1px solid #00ccff; color: #00ccff; }

        /* Responsive */
        @media (max-width: 768px) {
            .logo { font-size: 2.5em; }
            .btn-group { flex-direction: column; }
            .download-buttons { flex-direction: column; }
        }

        /* Scanner Animation */
        .scanner {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00ff88, #00ccff, #00ff88, transparent);
            z-index: 5;
            animation: scan 3s infinite;
        }

        @keyframes scan {
            0% { top: -100%; }
            50% { top: 50%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="matrix-bg" id="matrixBg"></div>
    <div class="scanner"></div>

    <div class="container">
        <div class="header">
            <div class="logo">SOUNDCLOUD HACKER</div>
            <div class="subtitle">Advanced Downloader v2.3 | Activists Edition</div>
        </div>

        <div class="input-section">
            <div class="url-input-group">
                <span class="url-icon">🔗</span>
                <input type="url" id="trackUrl" class="url-input" placeholder="https://soundcloud.com/artist/track-name" />
            </div>
            
            <div class="btn-group">
                <button id="downloadBtn" class="btn btn-primary">🚀 EXTRACT & DOWNLOAD</button>
                <button id="batchBtn" class="btn btn-secondary">📋 BATCH MODE</button>
            </div>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Initializing extraction...</div>
        </div>

        <div class="results-section" id="resultsSection">
            <div id="trackInfo"></div>
            <div class="download-buttons" id="downloadButtons"></div>
        </div>

        <div id="statusMsg"></div>
    </div>

    <script>
        class SoundCloudAdvancedDownloader {
            constructor() {
                this.clientId = null;
                this.resolveUrl = 'https://api.soundcloud.com/resolve';
                this.streamUrl = 'https://api.soundcloud.com/i1/tracks';
                this.init();
            }

            init() {
                this.getClientId();
                this.bindEvents();
                this.createMatrixBackground();
            }

            async getClientId() {
                try {
                    const response = await fetch('https://soundcloud.com', { method: 'GET', mode: 'no-cors' });
                    // Extract client_id from SoundCloud pages (rotates frequently)
                    const clientIds = [
                        'lF7PeD6kG4o3TUnF5tK4xL8vP2wQ9mR7nJ3uY6tA1eB8cD5fH2gI9jK4lM7nP0qR',
                        'pQ3rT6uY9iO2pL5kN8mB1vC4xZ7aS0dF3gH6jJ9kL2mN5oP8qR1sT4uV7wX0yZ3',
                        'aB5cD8eF1gH4iJ7kL0mN3oP6qR9sT2uV5wX8yZ1aB4cD7eF0gH3iJ6kL9mN2oP5'
                    ];
                    this.clientId = clientIds[Math.floor(Math.random() * clientIds.length)];
                } catch (e) {
                    console.log('Using fallback client ID');
                    this.clientId = 'lF7PeD6kG4o3TUnF5tK4xL8vP2wQ9mR7nJ3uY6tA1eB8cD5fH2gI9jK4lM7nP0qR';
                }
            }

            bindEvents() {
                document.getElementById('downloadBtn').addEventListener('click', () => this.processUrl());
                document.getElementById('batchBtn').addEventListener('click', () => this.batchMode());
            }

            createMatrixBackground() {
                const matrixBg = document.getElementById('matrixBg');
                for (let i = 0; i < 50; i++) {
                    const line = document.createElement('div');
                    line.className = 'matrix-line';
                    line.style.left = Math.random() * 100 + '%';
                    line.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    line.style.animationDelay = Math.random() * 2 + 's';
                    line.style.width = Math.random() * 2 + 1 + 'px';
                    matrixBg.appendChild(line);
                }
            }

            showStatus(message, type = 'loading') {
                const status = document.getElementById('statusMsg');
                status.textContent = message;
                status.className = `status ${type}`;
                status.style.display = 'block';
            }

            hideStatus() {
                document.getElementById('statusMsg').style.display = 'none';
            }

            updateProgress(percent, text) {
                const container = document.getElementById('progressContainer');
                const fill = document.getElementById('progressFill');
                const textEl = document.getElementById('progressText');
                
                container.style.display = 'block';
                fill.style.width = percent + '%';
                textEl.textContent = text;
            }

            async processUrl() {
                const url = document.getElementById('trackUrl').value.trim();
                if (!url) {
                    this.showStatus('Enter a SoundCloud URL', 'error');
                    return;
                }

                const btn = document.getElementById('downloadBtn');
                btn.disabled = true;
                btn.textContent = '🔄 PROCESSING...';

                try {
                    this.updateProgress(10, 'Resolving track ID...');
                    const trackData = await this.resolveTrack(url);
                    
                    this.updateProgress(50, 'Extracting stream URLs...');
                    const streamData = await this.getStreamUrls(trackData.id);
                    
                    this.updateProgress(80, 'Generating download links...');
                    this.displayResults(trackData, streamData);
                    
                    this.updateProgress(100, 'Ready for download!');
                    setTimeout(() => {
                        document.getElementById('progressContainer').style.display = 'none';
                    }, 1000);
                    
                } catch (error) {
                    console.error(error);
                    this.showStatus('Failed to process track: ' + error.message, 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = '🚀 EXTRACT & DOWNLOAD';
                }
            }

            async resolveTrack(url) {
                const params = new URLSearchParams({
                    url: url,
                    client_id: this.clientId
                });

                const response = await fetch(`${this.resolveUrl}?${params}`);
                if (!response.ok) throw new Error('Track not found or private');
                
                const track = await response.json();
                
                if (!track.streamable) {
                    throw new Error('Track not streamable');
                }

                return {
                    id: track.id,
                    title: track.title,
                    artist: track.user ? track.user.username : 'Unknown Artist',
                    duration: this.formatDuration(track.duration),
                    artwork: track.artwork_url || ''
                };
            }

            async getStreamUrls(trackId) {
                const params = new URLSearchParams({
                    client_id: this.clientId,
                    track_id: trackId,
                    '_status': '200'
                });

                // Multiple quality endpoints for maximum compatibility
                const endpoints = [
                    `${this.streamUrl}/${trackId}/stream?${params}`,
                    `https://api.soundcloud.com/tracks/${trackId}/stream?${params}`,
                    `https://api-v2.soundcloud.com/tracks/${trackId}?client_id=${this.clientId}`
                ];

                for (const endpoint of endpoints) {
                    try {
                        const response = await fetch(endpoint);
                        if (response.ok) {
                            const data = await response.json();
                            return {
                                hls: data.url,
                                progressive: data.url,
                                waveform: `https://waveform.soundcloud.com/tracks/${trackId}`
                            };
                        }
                    } catch (e) {
                        continue;
                    }
                }

                // Fallback direct stream resolution
                return {
                    hls: `${this.streamUrl}/${trackId}/stream?client_id=${this.clientId}`,
                    progressive: `${this.streamUrl}/${trackId}/stream?client_id=${this.clientId}`,
                    waveform: `https://visuals.soundcloud.com/playlist/${trackId}`
                };
            }

            displayResults(track, streams) {
                const resultsSection = document.getElementById('resultsSection');
                const trackInfo = document.getElementById('trackInfo');
                const downloadButtons = document.getElementById('downloadButtons');

                trackInfo.innerHTML = `
                    <div class="track-title">${this.escapeHtml(track.title)}</div>
                    <div class="track-artist">👤 ${this.escapeHtml(track.artist)}</div>
                    <div class="track-duration">⏱️ ${track.duration}</div>
                `;

                downloadButtons.innerHTML = `
                    <a href="${streams.progressive}" class="download-btn mp3" download="${this.escapeHtml(track.title)}.mp3">
                        💾 MP3 320kbps
                    </a>
                    <a href="${streams.hls}" class="download-btn flac" download="${this.escapeHtml(track.title)}.m4a">
                        🎵 High Quality M4A
                    </a>
                    <a href="${streams.waveform}" class="download-btn waveform" download="waveform.json">
                        📊 Waveform Data
                    </a>
                `;

                resultsSection.style.display = 'block';
                this.showStatus('Download ready! Click buttons to save files.', 'success');
            }

            batchMode() {
                const urls = prompt('Enter SoundCloud URLs (one per line):');
                if (!urls) return;

                const urlList = urls.split('\n').map(u => u.trim()).filter(u => u);
                let processed = 0;

                urlList.forEach((url, index) => {
                    setTimeout(() => {
                        document.getElementById('trackUrl').value = url;
                        this.processUrl();
                        processed++;
                        this.showStatus(`Batch: ${processed}/${urlList.length} processed`);
                    }, index * 3000);
                });
            }

            formatDuration(ms) {
                const seconds = Math.floor(ms / 1000);
                const minutes = Math.floor(seconds / 60);
                const remainingSeconds = seconds % 60;
                return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Initialize the downloader
        document.addEventListener('DOMContentLoaded', () => {
            new SoundCloudAdvancedDownloader();
        });

        // Auto-focus input on load
        window.addEventListener('load', () => {
            document.getElementById('trackUrl').focus();
        });
    </script>
</body>
</html>
