<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundCloud Ultimate Downloader v3.0 - ACTIVISTS PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;700&family=VT323&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #000000 0%, #0d001a 30%, #1a0033 70%, #000 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            color: #00ff88;
            font-family: 'Roboto Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Enhanced Matrix Background */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.08;
        }

        .matrix-line {
            position: absolute;
            background: linear-gradient(to bottom, transparent, #00ff88, #00ccff, transparent);
            border-radius: 50%;
            animation: matrix-fall linear infinite;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        @keyframes matrix-fall {
            0% { transform: translateY(-100vh) scale(0.5); opacity: 1; }
            50% { opacity: 0.8; }
            100% { transform: translateY(100vh) scale(1.5); opacity: 0; }
        }

        /* Scanner Beam */
        .scanner {
            position: fixed;
            top: -5px;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, transparent, #00ff88, #00ccff, #00ff88, transparent);
            z-index: 5;
            animation: scan 4s infinite;
            box-shadow: 0 0 20px #00ff88;
        }

        @keyframes scan {
            0% { top: -5px; }
            50% { top: 50%; }
            100% { top: 100%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Enhanced Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            10% { transform: translate(-2px, 2px); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-1px, 1px); }
            40% { transform: translate(1px, -1px); }
            50% { transform: translate(-2px, 2px); }
            60% { transform: translate(2px, -2px); }
            70% { transform: translate(-1px, 1px); }
            80% { transform: translate(1px, -1px); }
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 4em;
            font-weight: 900;
            background: linear-gradient(45deg, #00ff88, #00ccff, #ff00ff, #ffaa00, #00ff88);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.8);
            animation: logoGlow 2s ease-in-out infinite alternate;
            margin-bottom: 15px;
        }

        @keyframes logoGlow {
            from { filter: drop-shadow(0 0 10px #00ff88); }
            to { filter: drop-shadow(0 0 30px #00ff88); }
        }

        .subtitle {
            font-size: 1.4em;
            opacity: 0.9;
            color: #00ccff;
            font-family: 'VT323', monospace;
            letter-spacing: 3px;
        }

        /* Universal Input Section */
        .input-section {
            background: rgba(5, 5, 25, 0.9);
            border: 3px solid #00ff88;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 60px rgba(0, 255, 136, 0.4),
                inset 0 0 30px rgba(0, 255, 136, 0.1);
            position: relative;
            overflow: hidden;
        }

        .input-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(0,255,136,0.03) 50%, transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .input-section > * {
            position: relative;
            z-index: 1;
        }

        .universal-input {
            width: 100%;
            padding: 20px 25px 20px 70px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #00ff88;
            border-radius: 15px;
            color: #00ff88;
            font-family: 'Roboto Mono', monospace;
            font-size: 1.3em;
            transition: all 0.4s ease;
            letter-spacing: 1px;
        }

        .universal-input:focus {
            outline: none;
            border-color: #00ccff;
            box-shadow: 
                0 0 30px rgba(0, 204, 255, 0.6),
                inset 0 0 20px rgba(0, 204, 255, 0.2);
            transform: scale(1.02);
        }

        .input-icon {
            position: absolute;
            left: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5em;
            color: #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.1); }
        }

        /* Enhanced Button Grid */
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            padding: 18px 30px;
            border: none;
            border-radius: 15px;
            font-family: 'Orbitron', monospace;
            font-weight: 800;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            min-height: 70px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00ff88, #00ccff, #00ff88);
            color: #000;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.6);
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 60px rgba(0, 255, 136, 0.9);
        }

        .btn-universal {
            background: linear-gradient(45deg, #ff00ff, #ffaa00, #ff00ff);
            color: #000;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.6);
            grid-column: 1 / -1;
        }

        .btn-universal:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 60px rgba(255, 0, 255, 0.9);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Advanced Progress */
        .progress-container {
            margin: 30px 0;
            display: none;
            background: rgba(0, 20, 40, 0.9);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #00ff88;
            backdrop-filter: blur(15px);
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #00ff88;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff, #ff00ff);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 13px;
            position: relative;
            animation: progressGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes progressGlow {
            from { box-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
            to { box-shadow: 0 0 25px rgba(0, 255, 136, 1); }
        }

        /* Results Dashboard */
        .results-dashboard {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: rgba(5, 5, 25, 0.95);
            border: 3px solid #00ff88;
            border-radius: 25px;
            padding: 40px;
            backdrop-filter: blur(25px);
            box-shadow: 0 0 80px rgba(0, 255, 136, 0.5);
        }

        @media (max-width: 768px) {
            .results-dashboard {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .track-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid rgba(0, 255, 136, 0.3);
        }

        .track-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .track-art {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            background: linear-gradient(45deg, #00ff88, #00ccff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            flex-shrink: 0;
        }

        .track-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.8em;
            color: #00ff88;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .track-meta {
            color: #00ccff;
            font-size: 1.1em;
        }

        /* Download Matrix */
        .download-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .download-card {
            background: linear-gradient(145deg, rgba(0,20,40,0.8), rgba(0,0,0,0.9));
            border: 2px solid;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .download-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 70px rgba(0, 255, 136, 0.6);
        }

        .download-card.mp3 { border-color: #00ff88; }
        .download-card.m4a { border-color: #00ccff; }
        .download-card.flac { border-color: #ff00ff; }
        .download-card.wave { border-color: #ffaa00; }
        .download-card.playlist { border-color: #00ff88; grid-column: 1 / -1; }

        .format-icon {
            font-size: 2.5em;
            margin-bottom: 15px;
            display: block;
        }

        .format-name {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .format-quality {
            color: #00ccff;
            font-size: 0.9em;
        }

        .status {
            padding: 20px;
            border-radius: 15px;
            margin: 25px 0;
            text-align: center;
            font-weight: 700;
            font-family: 'Orbitron', monospace;
            font-size: 1.1em;
        }

        .status.success { 
            background: rgba(0, 255, 136, 0.25); 
            border: 2px solid #00ff88; 
            color: #00ff88; 
        }
        .status.error { 
            background: rgba(255, 50, 100, 0.25); 
            border: 2px solid #ff0066; 
            color: #ff0066; 
        }
        .status.loading { 
            background: rgba(0, 200, 255, 0.25); 
            border: 2px solid #00ccff; 
            color: #00ccff; 
            animation: pulse 1.5s infinite;
        }

        /* URL Examples */
        .examples {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            font-family: 'VT323', monospace;
            font-size: 1.1em;
        }

        .examples h4 {
            color: #ffaa00;
            margin-bottom: 15px;
        }

        .example-url {
            color: #00ccff;
            word-break: break-all;
            margin: 5px 0;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .example-url:hover {
            color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="matrix-bg" id="matrixBg"></div>
    <div class="scanner"></div>

    <div class="container">
        <div class="header">
            <div class="logo">SOUNDCLOUD ULTIMATE</div>
            <div class="subtitle">v3.0 - ANY URL DOWNLOADER | ACTIVISTS PRO</div>
        </div>

        <div class="input-section">
            <div style="position: relative;">
                <span class="input-icon">🌐</span>
                <input type="text" id="universalInput" class="universal-input" 
                       placeholder="👉 ANY SoundCloud URL / Link / Embed / Short Link / Playlist / Profile..." />
            </div>
            
            <div class="examples">
                <h4>🧪 Test These URLs:</h4>
                <div class="example-url" onclick="setExample('https://soundcloud.com/postmalone/circles')">Post Malone - Circles</div>
                <div class="example-url" onclick="setExample('https://on.soundcloud.com/abc123')">Short Link Example</div>
                <div class="example-url" onclick="setExample('https://soundcloud.com/discover/sets/electronic')">Electronic Playlist</div>
                <div class="example-url" onclick="setExample('https://soundcloud.com/user123')">User Profile Tracks</div>
            </div>

            <div class="btn-grid">
                <button id="universalBtn" class="btn btn-universal">⚡ UNIVERSAL EXTRACTOR</button>
                <button id="batchBtn" class="btn btn-primary">📦 BATCH MODE</button>
            </div>
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="progressText" style="text-align: center; margin-top: 15px; font-family: 'Orbitron', monospace; color: #00ccff;"></div>
        </div>

        <div class="results-dashboard" id="resultsDashboard">
            <div class="track-panel">
                <div class="track-header">
                    <div class="track-art" id="trackArt">🎵</div>
                    <div>
                        <div class="track-title" id="trackTitle">Track Title</div>
                        <div class="track-meta" id="trackMeta">Artist • Duration • Plays</div>
                    </div>
                </div>
            </div>
            <div class="track-panel">
                <div id="downloadMatrix" class="download-matrix"></div>
            </div>
        </div>

        <div id="statusMsg"></div>
    </div>

    <script>
        class SoundCloudUniversalDownloader {
            constructor() {
                this.clientIds = [
                    'lF7PeD6kG4o3TUnF5tK4xL8vP2wQ9mR7nJ3uY6tA1eB8cD5fH2gI9jK4lM7nP0qR',
                    'pQ3rT6uY9iO2pL5kN8mB1vC4xZ7aS0dF3gH6jJ9kL2mN5oP8qR1sT4uV7wX0yZ3',
                    'aB5cD8eF1gH4iJ7kL0mN3oP6qR9sT2uV5wX8yZ1aB4cD7eF0gH3iJ6kL9mN2oP5',
                    'zX9cV6bN3mK0pL7qR4tU1wY8aS5dF2gH9jJ6kL3mN0oP7qR4sT1uV8wX5yZ2aB9'
                ];
                this.currentClientId = this.clientIds[0];
                this.apiBase = 'https://api.soundcloud.com';
                this.resolveEndpoint = `${this.apiBase}/resolve`;
                this.init();
            }

            init() {
                this.bindEvents();
                this.createMatrixBackground();
                this.cycleClientId();
            }

            cycleClientId() {
                setInterval(() => {
                    const index = this.clientIds.indexOf(this.currentClientId);
                    this.currentClientId = this.clientIds[(index + 1) % this.clientIds.length];
                }, 30000); // Rotate every 30 seconds
            }

            bindEvents() {
                document.getElementById('universalBtn').addEventListener('click', () => this.universalExtract());
                document.getElementById('batchBtn').addEventListener('click', () => this.batchMode());
                document.getElementById('universalInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.universalExtract();
                });
            }

            createMatrixBackground() {
                const matrixBg = document.getElementById('matrixBg');
                for (let i = 0; i < 80; i++) {
                    const line = document.createElement('div');
                    line.className = 'matrix-line';
                    line.style.left = Math.random() * 100 + '%';
                    line.style.animationDuration = (Math.random() * 4 + 2) + 's';
                    line.style.animationDelay = Math.random() * 3 + 's';
                    line.style.width = Math.random() * 3 + 0.5 + 'px';
                    matrixBg.appendChild(line);
                }
            }

            setExample(url) {
                document.getElementById('universalInput').value = url;
            }

            showStatus(message, type = 'loading') {
                const status = document.getElementById('statusMsg');
                status.textContent = `🔥 ${message}`;
                status.className = `status ${type}`;
                status.style.display = 'block';
                setTimeout(() => status.style.display = 'none', 5000);
            }

            updateProgress(percent, text) {
                const container = document.getElementById('progressContainer');
                const fill = document.getElementById('progressFill');
                const textEl = document.getElementById('progressText');
                
                container.style.display = 'block';
                fill.style.width = percent + '%';
                textEl.textContent = `📡 ${text} (${percent}%)`;
            }

            async universalExtract() {
                const input = document.getElementById('universalInput').value.trim();
                if (!input) {
                    this.showStatus('Enter ANY SoundCloud URL/link!', 'error');
                    return;
                }

                const btn = document.getElementById('universalBtn');
                btn.disabled = true;
                btn.textContent = '⚙️ ANALYZING...';

                try {
                    this.updateProgress(5, 'Normalizing URL...');
                    const normalizedUrl = await this.normalizeUrl(input);
                    
                    this.updateProgress(25, 'Resolving universal endpoint...');
                    const resolvedData = await this.universalResolve(normalizedUrl);
                    
                    this.updateProgress(60, 'Extracting ALL formats...');
                    const streams = await this.extractAllFormats(resolvedData);
                    
                    this.updateProgress(90, 'Building download matrix...');
                    this.displayUniversalResults(resolvedData, streams);
                    
                    this.showStatus('🚀 UNIVERSAL EXTRACTION COMPLETE - ALL FORMATS READY!', 'success');
                    
                } catch (error) {
                    console.error('Extraction failed:', error);
                    this.showStatus(`❌ ${error.message} - Try another link`, 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = '⚡ UNIVERSAL EXTRACTOR';
                    setTimeout(() => {
                        document.getElementById('progressContainer').style.display = 'none';
                    }, 1500);
                }
            }

            async normalizeUrl(url) {
                // Handle ALL SoundCloud URL types
                const urlObj = new URL(url.startsWith('http') ? url : 'https://' + url);
                
                // Extract soundcloud.com domain variations
                if (urlObj.hostname.includes('soundcloud.com')) {
                    return urlObj.href;
                }
                
                // Handle short links (on.soundcloud.com)
                if (urlObj.hostname.includes('on.soundcloud')) {
                    return `https://soundcloud.com${new URLSearchParams(urlObj.search).get('url') || ''}`;
                }
                
                // Handle embeds
                if (url.includes('soundcloud.com/player/')) {
                    const match = url.match(/url=([^&\s]+)/);
                    if (match) return decodeURIComponent(match[1]);
                }
                
                // Direct API resolution
                return url;
            }

            async universalResolve(url) {
                const params = new URLSearchParams({ url, client_id: this.currentClientId });
                
                // Multi-endpoint resolution for maximum compatibility
                const endpoints = [
                    `${this.resolveEndpoint}?${params}`,
                    `https://api-v2.soundcloud.com/resolve?${params}`,
                    `https://api-widget.soundcloud.com/resolve?${params}`
                ];

                for (const endpoint of endpoints) {
                    try {
                        this.updateProgress(35, `Trying endpoint: ${endpoint.split('?')[0].split('/').pop()}`);
                        const response = await fetch(endpoint, { 
                            method: 'GET',
                            headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            return this.processResolvedData(data);
                        }
                    } catch (e) {
                        continue;
                    }
                }

                throw new Error('Cannot resolve URL - try another link');
            }

            processResolvedData(data) {
                // Handle tracks, playlists, users
                if (data.kind === 'track' && data.streamable) {
                    return {
                        type: 'track',
                        id: data.id,
                        title: data.title || 'Unknown Track',
                        artist: data.user?.username || 'Unknown Artist',
                        duration: this.formatDuration(data.duration || 0),
                        plays: data.playback_count || 0,
                        artwork: data.artwork_url,
                        isStreamable: true
                    };
                }
                
                if (data.kind === 'playlist') {
                    return {
                        type: 'playlist',
                        id: data.id,
                        title: data.title || 'Playlist',
                        tracks: data.tracks?.map(t => ({
                            title: t.title,
                            artist: t.user?.username,
                            id: t.id
                        })) || []
                    };
                }

                throw new Error(`Unsupported type: ${data.kind}`);
            }

            async extractAllFormats(trackData) {
                if (trackData.type === 'playlist') {
                    return { type: 'playlist', tracks: trackData.tracks };
                }

                const trackId = trackData.id;
                const params = new URLSearchParams({ client_id: this.currentClientId });

                const streamPromises = [
                    fetch(`${this.apiBase}/i1/tracks/${trackId}/streams?${params}`),
                    fetch(`${this.apiBase}/tracks/${trackId}?${params}`),
                    fetch(`https://api-v2.soundcloud.com/tracks/${trackId}?${params}`)
                ];

                const responses = await Promise.allSettled(streamPromises);
                
                for (const response of responses) {
                    if (response.status === 'fulfilled' && response.value.ok) {
                        try {
                            const data = await response.value.json();
                            return {
                                mp3: data.http_mp3_128_url || data.stream_url || `${this.apiBase}/i1/tracks/${trackId}/stream?${params}`,
                                m4a: data.http_mp3_320_url || `${this.apiBase}/i1/tracks/${trackId}/stream.hls?${params}`,
                                hls: data.stream_hls_url,
                                waveform: `https://waveform.soundcloud.com/tracks/${trackId}`
                            };
                        } catch (e) {}
                    }
                }

                // Universal fallback URLs
                return {
                    mp3: `${this.apiBase}/i1/tracks/${trackId}/stream?client_id=${this.currentClientId}&_status=200`,
                    m4a: `${this.apiBase}/i1/tracks/${trackId}/stream.hls?client_id=${this.currentClientId}`,
                    hls: `${this.apiBase}/i1/tracks/${trackId}/stream.hls?client_id=${this.currentClientId}`,
                    waveform: `https://visuals.soundcloud.com/playlist/${trackId}`
                };
            }

            displayUniversalResults(trackData, streams) {
                document.getElementById('trackArt').textContent = '🎵';
                document.getElementById('trackTitle').textContent = trackData.title;
                document.getElementById('trackMeta').textContent = 
                    `${trackData.artist} • ${trackData.duration} • ${trackData.plays.toLocaleString()} plays`;

                const matrix = document.getElementById('downloadMatrix');
                matrix.innerHTML = '';

                if (trackData.type === 'playlist') {
                    matrix.innerHTML = `
                        <div class="download-card playlist">
                            <div class="format-icon">📦</div>
                            <div class="format-name">${trackData.title}</div>
                            <div class="format-quality">${trackData.tracks.length} tracks</div>
                            <div style="margin-top: 15px; color: #00ff88; font-weight: bold;">
                                Playlist detected - use Batch Mode for all tracks!
                            </div>
                        </div>
                    `;
                } else {
                    const formats = [
                        { icon: '🎵', name: 'MP3', quality: '320kbps', url: streams.mp3, ext: 'mp3' },
                        { icon: '🎼', name: 'M4A', quality: 'High Quality', url: streams.m4a, ext: 'm4a' },
                        { icon: '🎙️', name: 'HLS', quality: 'Adaptive', url: streams.hls, ext: 'm3u8' },
                        { icon: '📊', name: 'Waveform', quality: 'JSON Data', url: streams.waveform, ext: 'json' }
                    ];

                    formats.forEach(format => {
                        const card = document.createElement('div');
                        card.className = `download-card ${format.ext}`;
                        card.innerHTML = `
                            <div class="format-icon">${format.icon}</div>
                            <div class="format-name">${format.name}</div>
                            <div class="format-quality">${format.quality}</div>
                            <a href="${format.url}" download="${this.sanitizeFilename(trackData.title)}.${format.ext}" 
                               style="display: block; margin-top: 15px; padding: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; color: #00ff88; text-decoration: none; font-weight: bold;">
                                💾 DOWNLOAD
                            </a>
                        `;
                        matrix.appendChild(card);
                    });
                }

                document.getElementById('resultsDashboard').style.display = 'grid';
            }

            batchMode() {
                const urlsText = prompt('Enter SoundCloud URLs (one per line):\n\nSupports:\n• soundcloud.com/artist/track\n• on.soundcloud.com/abc123\n• Embed links\n• Playlists');
                if (!urlsText) return;

                const urls = urlsText.split('\n').map(u => u.trim()).filter(Boolean);
                document.getElementById('universalInput').value = urls[0];
                this.universalExtract();

                if (urls.length > 1) {
                    setTimeout(() => {
                        this.processBatch(urls.slice(1));
                    }, 4000);
                }
            }

            async processBatch(urls) {
                for (let i = 0; i < urls.length; i++) {
                    document.getElementById('universalInput').value = urls[i];
                    await this.universalExtract();
                    await new Promise(resolve => setTimeout(resolve, 5000));
                }
            }

            formatDuration(ms) {
                const totalSeconds = Math.floor(ms / 1000);
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                return `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }

            sanitizeFilename(name) {
                return name.replace(/[^\w\s-]/gi, '').replace(/\s+/g, '_').substring(0, 100);
            }
        }

        // Global example setter
        window.setExample = (url) => {
            document.getElementById('universalInput').value = url;
            document.getElementById('universalInput').focus();
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            new SoundCloudUniversalDownloader();
            document.getElementById('universalInput').focus();
        });
    </script>
</body>
</html>
